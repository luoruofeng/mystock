version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: mystock-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mystock
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data:
